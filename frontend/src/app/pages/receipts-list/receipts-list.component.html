<div class="mb-4 flex items-center justify-between">
  <h1 class="text-xl font-semibold">Receipts</h1>

  <button
    class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
    (click)="goToUpload()"
  >
    + Upload / Scan Receipt
  </button>
</div>

<app-receipt-table
  title=""
  [rows]="receipts"
  [itemsPerPage]="8"
  [newReceiptIds]="newReceiptIds"
  (viewClick)="openDetail($event)"
  (deleteClick)="deleteReceipt($event)"
></app-receipt-table>
